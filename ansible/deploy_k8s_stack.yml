---
- name: Deploy RKE2, Helm, Rancher, Longhorn, and KubeVirt
  hosts: nodes
  vars_files:
    - secrets.yml
  become: true
  vars:
    domain: "goodwin.website"
    rancher_hostname: "rancher.{{ domain }}"
    
    # Фиксированные версии для идемпотентности
    rke2_version: "v1.28.7+rke2r1"
    kubevirt_version: "v1.1.0"  # Фиксированная стабильная версия
    cdi_version: "v1.58.0"       # Фиксированная стабильная версия
    cert_manager_version: "v1.14.4"
    
    ansible_python_interpreter: /usr/bin/python3

  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "{{ ansible_env.PATH }}:/var/lib/rancher/rke2/bin:/usr/local/bin"

  tasks:
    - name: Update system and install dependencies
      apt:
        name:
          - curl
          - open-iscsi
          - nfs-common
          - cryptsetup
          - gnupg
          - lsb-release
          - ca-certificates
          - python3
          - python3-pip
        state: present
        update_cache: yes
        cache_valid_time: 3600  # Обновлять кэш только если старше 1 часа

    - name: Install Python Kubernetes client
      pip:
        name: kubernetes
        state: present

    - name: Prepare Longhorn directories on disks
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      with_items:
        - /mnt/nvme_storage
        - /mnt/ssd_storage
        - /mnt/hdd_fast
        - /mnt/hdd_slow

    - name: Install RKE2
      shell: |
        curl -sfL https://get.rke2.io | sh -
      environment:
        INSTALL_RKE2_VERSION: "{{ rke2_version }}"
      args:
        creates: /usr/local/bin/rke2
      when: ansible_facts['os_family'] == "Debian"

    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'

    - name: Check if RKE2 config exists
      stat:
        path: /etc/rancher/rke2/config.yaml
      register: rke2_config

    - name: Write RKE2 config
      copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          tls-san:
            - "{{ ansible_host }}"
            - "{{ domain }}"
          cni: canal
          write-kubeconfig-mode: "0644"
          token: "{{ rke2_token }}"
      notify: restart rke2
      when: not rke2_config.stat.exists  # Только если конфиг не существует

    - name: Enable and start RKE2
      systemd:
        name: rke2-server
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Wait for Kubeconfig to be generated
      wait_for:
        path: /etc/rancher/rke2/rke2.yaml
        timeout: 120

    - name: Install kubectl via RKE2
      file:
        src: /var/lib/rancher/rke2/bin/kubectl
        dest: /usr/local/bin/kubectl
        state: link

    - name: Setup environment in .bashrc
      lineinfile:
        path: ~/.bashrc
        line: "export KUBECONFIG=/etc/rancher/rke2/rke2.yaml; export PATH=$PATH:/var/lib/rancher/rke2/bin:/usr/local/bin"
        create: yes

    - name: Install Helm
      shell: |
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod +x get_helm.sh
        ./get_helm.sh
        rm get_helm.sh
      args:
        creates: /usr/local/bin/helm
      when: ansible_facts['os_family'] == "Debian"

    - name: Add Helm repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
        update_repo_cache: yes  # Обновляет кэш репозитория
      loop:
        - { name: rancher-stable, url: https://releases.rancher.com/server-charts/stable }
        - { name: longhorn, url: https://charts.longhorn.io }
        - { name: jetstack, url: https://charts.jetstack.io }
      run_once: true

    - name: Create namespaces
      kubernetes.core.k8s:
        name: "{{ item }}"
        api_version: v1
        kind: Namespace
        state: present
      loop:
        - cert-manager
        - cattle-system
        - longhorn-system
        - kubevirt
      run_once: true

    - name: Check if cert-manager is installed
      kubernetes.core.helm_info:
        name: cert-manager
        release_namespace: cert-manager
      register: cert_manager_info
      ignore_errors: yes
      run_once: true

    - name: Install Cert-Manager
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        chart_version: "{{ cert_manager_version }}"
        release_namespace: cert-manager
        create_namespace: true
        set_values:
          - value: installCRDs=true
          - value: global.leaderElection.namespace=cert-manager
        wait: true
        wait_timeout: 5m
      run_once: true
      when: cert_manager_info.failed  # Устанавливаем только если не установлен

    - name: Wait for cert-manager pods
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: cert-manager
        label_selectors:
          - app.kubernetes.io/instance = cert-manager
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      run_once: true
      when: cert_manager_info.failed

    - name: Check if Rancher is installed
      kubernetes.core.helm_info:
        name: rancher
        release_namespace: cattle-system
      register: rancher_info
      ignore_errors: yes
      run_once: true

    - name: Install Rancher
      kubernetes.core.helm:
        name: rancher
        chart_ref: rancher-stable/rancher
        release_namespace: cattle-system
        create_namespace: true
        set_values:
          - value: "hostname={{ rancher_hostname }}"
          - value: bootstrapPassword=admin
          - value: replicas=1
          - value: global.cattle.psp.enabled=false
        wait: true
        wait_timeout: 10m
      run_once: true
      when: rancher_info.failed  # Устанавливаем только если не установлен

    - name: Check if Longhorn is installed
      kubernetes.core.helm_info:
        name: longhorn
        release_namespace: longhorn-system
      register: longhorn_info
      ignore_errors: yes
      run_once: true

    - name: Install Longhorn
      kubernetes.core.helm:
        name: longhorn
        chart_ref: longhorn/longhorn
        release_namespace: longhorn-system
        create_namespace: true
        set_values:
          - value: persistence.defaultClass=true
          - value: defaultSettings.defaultDataPath=/mnt/nvme_storage
        wait: true
        wait_timeout: 10m
      run_once: true
      when: longhorn_info.failed  # Устанавливаем только если не установлен

    - name: Check if KubeVirt operator exists
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: kubevirts.kubevirt.io
      register: kubevirt_crd
      run_once: true

    - name: Install KubeVirt Operator
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('url', 'https://github.com/kubevirt/kubevirt/releases/download/' + kubevirt_version + '/kubevirt-operator.yaml', split_lines=False) }}"
      run_once: true
      when: kubevirt_crd.resources | length == 0  # Устанавливаем только если CRD не существует

    - name: Check if KubeVirt CR exists
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: KubeVirt
        name: kubevirt
        namespace: kubevirt
      register: kubevirt_cr
      run_once: true

    - name: Install KubeVirt CR
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('url', 'https://github.com/kubevirt/kubevirt/releases/download/' + kubevirt_version + '/kubevirt-cr.yaml', split_lines=False) }}"
      run_once: true
      when: kubevirt_cr.resources | length == 0  # Устанавливаем только если CR не существует

    - name: Check if CDI operator exists
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: cdis.cdi.kubevirt.io
      register: cdi_crd
      run_once: true

    - name: Install CDI Operator
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('url', 'https://github.com/kubevirt/containerized-data-importer/releases/download/' + cdi_version + '/cdi-operator.yaml', split_lines=False) }}"
      run_once: true
      when: cdi_crd.resources | length == 0  # Устанавливаем только если CRD не существует

    - name: Check if CDI CR exists
      kubernetes.core.k8s_info:
        api_version: cdi.kubevirt.io/v1beta1
        kind: CDI
        name: cdi
        namespace: kubevirt
      register: cdi_cr
      run_once: true

    - name: Install CDI CR
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('url', 'https://github.com/kubevirt/containerized-data-importer/releases/download/' + cdi_version + '/cdi-cr.yaml', split_lines=False) }}"
      run_once: true
      when: cdi_cr.resources | length == 0  # Устанавливаем только если CR не существует

    - name: Wait for KubeVirt to be ready
      kubernetes.core.k8s_info:
        kind: KubeVirt
        name: kubevirt
        namespace: kubevirt
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300
      run_once: true
      when: kubevirt_cr.resources | length == 0

    - name: Display Rancher access information
      debug:
        msg:
          - "Rancher URL: https://{{ rancher_hostname }}"
          - "Username: admin"
          - "Password: admin"
          - "Please change password after first login!"
      run_once: true

  handlers:
    - name: restart rke2
      systemd:
        name: rke2-server
        state: restarted
        daemon_reload: yes