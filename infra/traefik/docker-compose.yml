services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: always
    user: root
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/acme.json:/acme.json
      - /mnt/storage/infra/traefik/data/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/acme.json"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--providers.file.filename=/etc/traefik/dynamic_conf.yml"
      - "--providers.file.watch=true"
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dash.rule=Host(`${DOMAIN_TRAEFIK}`)"
      - "traefik.http.routers.traefik-dash.service=api@internal"
      - "traefik.http.routers.traefik-dash.entrypoints=websecure"
      - "traefik.http.routers.traefik-dash.tls.certresolver=myresolver"
      # Роутер для Cockpit (проксирует на локальный порт 9090 сервера)
      - "traefik.http.routers.cockpit.rule=Host(`${DOMAIN_COCKPIT}`)"
      - "traefik.http.routers.cockpit.entrypoints=websecure"
      - "traefik.http.routers.cockpit.tls.certresolver=myresolver"
      - "traefik.http.routers.cockpit.service=cockpit-svc"
      - "traefik.http.services.cockpit-svc.loadbalancer.passhostheader=false"
      - "traefik.http.services.cockpit-svc.loadbalancer.server.url=http://host.docker.internal:9090"

networks:
  web:
    external: true

