services:
  shared-postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${INPUT_PORT}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # TCP роутер для Postgres (порт 5433)
      - "traefik.tcp.routers.postgres.rule=HostSNI(`${POSTGRES_DB}`)"
      - "traefik.tcp.routers.postgres.entrypoints=websecure"
      - "traefik.tcp.routers.postgres.tls.certresolver=myresolver"
      - "traefik.tcp.services.postgres.loadbalancer.server.port=${INPUT_PORT}"

  postgres-1c:
    image: gmist/postgrespro-1c:v15
    container_name: postgres-1c
    restart: always
    command: postgres -c password_encryption=md5
    environment:
      - POSTGRES_USER=${POSTGRES_1C_USER}
      - POSTGRES_PASSWORD=${POSTGRES_1C_PASSWORD}
      - POSTGRES_DB=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data_1c:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  shared-redis:
    image: redis:7-alpine
    container_name: shared-redis
    restart: always
    command: redis-server --requirepass ${REDIS_ADMIN_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # TCP роутер для Redis (порт 6379)
      - "traefik.tcp.routers.redis.rule=HostSNI(`${DOMAIN_REDIS}`)"
      - "traefik.tcp.routers.redis.entrypoints=websecure"
      - "traefik.tcp.routers.redis.tls.certresolver=myresolver"
      - "traefik.tcp.services.redis.loadbalancer.server.port=6379"

networks:
  web:
    external: true
