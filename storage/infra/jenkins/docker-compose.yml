services:
  jenkins:
    build: .
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: always
    user: root
    environment:
      - JAVA_OPTS=-Xmx4g # Ограничение памяти Java
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jenkins.rule=Host(`${DOMAIN_JENKINS}`)"
      - "traefik.http.routers.jenkins.entrypoints=websecure"
      - "traefik.http.routers.jenkins.tls.certresolver=myresolver"
      - "traefik.http.services.jenkins.loadbalancer.server.port=8080"
    volumes:
      - ./data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Даем доступ к докеру хоста
    networks:
      - web

networks:
  web:
    external: true

